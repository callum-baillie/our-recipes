# GoalBuddy v2 state.yaml
# Board truth lives here. The charter is editable context; this file owns execution state.

version: 2

goal:
  title: "Our Recipes — production self-hosted recipe manager"
  slug: "our-recipes"
  kind: existing_plan
  tranche: "Continuously execute validated, coherent implementation packages until the full supplied release outcome is proven."
  status: done
  oracle:
    signal: "A fresh documented Docker deployment supports the complete household recipe-management workflow and has receipt-backed passing release gates."
    cadence: "After every Worker package, every phase boundary, and the final audit."
    final_proof: "Current test, accessibility, visual, build, Docker health/persistence, backup/restore, Unraid-review, and final-audit evidence mapped to each release criterion."
  intake:
    original_request: "Build a complete, production-quality, self-hosted personal recipe manager."
    interpreted_outcome: "A fully working, polished, secure self-hosted household recipe manager deployable on Unraid, not a partial MVP."
    input_shape: existing_plan
    audience: "A private household using a local Unraid server"
    authority: requested
    proof_type: demo
    completion_proof: "All stated release acceptance criteria and applicable quality gates pass with automated and direct visual evidence."
    likely_misfire: "Stopping at a scaffold, mock interface, partial feature subset, or isolated passing tests rather than a deployable complete release."
    blind_spots_considered:
      - "OpenAI credentials and paid calls require an explicit later gate; deterministic mocks are the default."
      - "Profiles are not access control and the LAN/no-auth security warning must remain visible."
      - "Imports, uploads, archives, images, migrations, backups, and restores process untrusted input and need defense in depth."
      - "The project starts from an empty repository, so current dependency choices, architecture, and quality gates require evidence before scaffolding."
      - "Docker persistence, 10,000-recipe responsiveness, accessibility, responsive layouts, and print output require direct verification beyond code review."
    existing_plan_facts:
      - "Product name: Our Recipes; APP_NAME controls displayed name."
      - "Initial runtime: private household Unraid deployment with shared recipes and switchable non-authenticated profiles."
      - "Required stack includes current stable Node LTS, pnpm, Next.js App Router, strict TypeScript, shadcn/Radix, Tailwind, Drizzle, SQLite, Zod, React Hook Form, OpenAI SDK, server-side image processing, Vitest, Playwright, accessibility checks, and a maintained PWA solution."
      - "Must preserve clear full-stack boundaries, expose versioned REST endpoints and OpenAPI, and keep future mobile support possible without building a mobile app now."
      - "Recipes require structured data, revisions, creators/editors, images, JSON-LD portability, FTS search, filters, scaling/conversion, cooking mode, timers, meal planning, shopping lists, printing, and per-profile preferences/history."
      - "URL, text, image, handwriting, and PDF capture must be reviewable before persistence; AI normalization and image generation are optional, server-only, locally stored, auditable, and never silent."
      - "Production scope includes secure URL/file/image/archive handling; backups/restores; Docker/Unraid packaging; CI build workflow; extensive documentation; mocked AI tests; visual/a11y checks; and release acceptance verification."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/our-recipes/"
    command: "node C:/Users/Callum/.codex/plugins/cache/goalbuddy/goalbuddy/0.4.0/skills/goal-prep/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal docs/goals/our-recipes"

active_task: null

