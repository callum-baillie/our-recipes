      - "User-supplied Our Recipes specification"
      - "Current repository environment and Git state"
      - "Existing goal charter and board"
    constraints:
      - "Read-only."
      - "Do not scaffold or edit product files."
      - "Preserve every user-supplied requirement; identify only material ambiguity, conflict, or dependency risk."
      - "Do not authorize live OpenAI use, remote publishing, or destructive operations."
    expected_output:
      - "Validated phase sequence"
      - "Research requirements for T002 and T003"
      - "Exact first implementation-package decision criteria"
      - "Risks, dependencies, and deferred human approvals"
    receipt:
      result: done
      harness: codex
      decision: approved
      full_outcome_complete: false
      rationale: "The detailed plan is executable from the empty repository. Its breadth requires research-first dependency selection, then coherent production packages rather than a mock or narrow MVP. T002 and T003 supply the only material evidence missing before T004 chooses the foundation; no human approval blocks this read-only phase."
