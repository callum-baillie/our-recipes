# GoalBuddy v2 state.yaml
# Initial live-board seed. The PM will populate the validated execution queue while this board is running.

version: 2

goal:
  title: "Pantry Inventory Layer"
  slug: "pantry-inventory"
  kind: existing_plan
  tranche: "continuous execution through the complete integrated Pantry outcome"
  status: done
  oracle:
    signal: "Fresh migration plus tested and rendered Pantry -> recipes -> meal plan -> grocery -> cooking workflow with repository gates passing"
    cadence: "after each Worker package and at final audit"
    final_proof: "Receipt-backed migration, unit/integration, repository-gate, focused E2E/accessibility, rendered-flow, security, and final Judge evidence"
  intake:
    original_request: "Implement the complete integrated Pantry feature described in the referenced pasted brief; inspect first, then plan and implement without stopping at a partial MVP."
    interpreted_outcome: "Our Recipes has a trustworthy household inventory layer integrated end to end with recipes, planned demand, grocery shortages, purchases, and confirmed cooking consumption."
    input_shape: existing_plan
    audience: "Our Recipes households"
    authority: approved
    proof_type: demo
    completion_proof: "A fresh migrated household completes the full Pantry-to-cooking workflow and all applicable quality gates pass."
    likely_misfire: "A polished isolated Pantry CRUD page ships without reliable cross-feature quantity, demand, and audit behavior."
    blind_spots_considered:
      - "Existing ingredients may be free-form and must remain compatible when unmapped."
      - "Household profiles are not an authorization boundary; signed ActorContext must remain the audit seam."
      - "Unit conversions, expiry semantics, concurrent updates, and multi-meal allocation can produce plausible but wrong totals."
      - "The broad plan needs coherent vertical slices while retaining every core acceptance criterion."
      - "Unavailable Docker or real-device evidence must be reported honestly rather than inferred from build or CI evidence."
    existing_plan_facts:
      - "Inspect repository architecture, schema, household/auth, ingredients, units, meal planner, grocery logic, APIs, state, design system, tests, and conventions first."
      - "Separate reusable product definitions from household-owned physical inventory batches."
      - "Add customizable locations, batch actions, FEFO selection, atomic adjustments, event history, and practical undo."
      - "Preserve original recipe ingredient text and add a safe optional canonical mapping layer where needed."
      - "Integrate availability into recipe cards/details and serving-scaled calculations."
      - "Aggregate projected demand across all planned meals without physically consuming or double-allocating stock."
      - "Expose explainable grocery math, preserve manual overrides, and avoid incompatible ingredient/unit merging."
      - "Confirm cooking deductions; link inventory history to recipes, meal entries, and grocery items."
      - "Support staples, low-stock replenishment, purchased-item Pantry intake, leftovers, and future product identifiers."
      - "Do not implement barcode scanning or a notification delivery system in this phase."
      - "Complete migrations, development-database checks, tests, formatting, lint, types, build, documentation, and final report."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/pantry-inventory/"
    command: "node C:/Users/Callum/.codex/plugins/cache/goalbuddy/goalbuddy/0.4.1/skills/goal-prep/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal C:/Users/Callum/Documents/Recipe/docs/goals/pantry-inventory"

