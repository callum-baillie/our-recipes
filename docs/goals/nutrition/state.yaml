# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Integrated Household Nutrition"
  slug: "nutrition"
  kind: existing_plan
  tranche: "continuous execution through the complete integrated Nutrition outcome"
  status: done
  oracle:
    signal: "Fresh migration plus tested and rendered individual, shared-household, Pantry/grocery, and incomplete-data Nutrition workflows with repository gates passing"
    cadence: "after each Worker package and at final audit"
    final_proof: "Receipt-backed migration, domain/unit/integration, permission/privacy, full repository-gate, focused E2E/accessibility, rendered-flow, historical-integrity, and final primary-agent audit evidence"
  intake:
    original_request: "Implement the complete integrated Nutrition feature described in the referenced pasted brief; inspect first, then plan and implement continuously rather than stopping at a partial tracker."
    interpreted_outcome: "Our Recipes has a trustworthy shared-household nutrition-management layer integrated end to end with recipes, planned meals, cooking, consumption, Pantry, groceries, goals, trends, and household comparisons; every existing header profile has one Nutrition profile, the active header profile drives Your Nutrition, all household profiles remain mutually viewable, and Nutrition has no separate authentication or credentials."
    input_shape: existing_plan
    audience: "Our Recipes households"
    authority: approved
    proof_type: demo
    completion_proof: "A fresh migrated household completes all four supplied workflows using only existing header-profile selection, with one Nutrition profile per app profile, shared cross-profile stats/charts, active-profile-focused Your Nutrition, correct calculations and immutable snapshots, no parallel Nutrition credential flow, accessible views, and applicable quality gates passing."
    likely_misfire: "A polished isolated calorie dashboard ships with a parallel Nutrition identity/login, duplicated profiles, mutable history, missing shared household visibility, equal allocation assumptions, or planned/Pantry food counted as consumed."
    blind_spots_considered:
      - "Pantry is a separate active goal whose implementation is not yet proven in this checkout; integration must follow actual repository evidence."
      - "Existing household profiles are convenience identity, not access control; the latest owner decision deliberately makes Nutrition household-shared and removes its parallel credential/permission gate while preserving ActorContext for audit attribution."
      - "Authoritative personalized reference data, missing sensitive profile fields, source conflicts, and jurisdiction/version changes require explicit semantics."
      - "Unit and density conversion, yield and retention, timezones, historical snapshots, incomplete data, concurrency, and idempotency can produce plausible but incorrect results."
      - "The broad plan needs coherent vertical slices without silently dropping core acceptance criteria."
      - "Unavailable Docker, real-device, external-provider, or live-reference evidence must be reported honestly rather than inferred."
    existing_plan_facts:
      - "The authoritative plan is C:/Users/Callum/.codex/attachments/3448dd1c-b1f2-4c59-a0b5-1eca707057a1/pasted-text-1.txt."
      - "Inspect household/user, recipes/ingredients/servings/scaling, units, planner, grocery, Pantry, nutrition fields, auth, database, API/actions, state, design/charts, and tests before implementation."
      - "Add top-level Nutrition navigation using /nutrition when consistent, with Overview, Food Diary, Nutrients, Trends, Household, and Goals information hierarchy."
      - "Keep available, planned, prepared, assigned, consumed, calculated, snapshotted, target, reference, personalized, estimated, and verified concepts separate."
      - "Create exactly one Nutrition profile for each existing app/header profile, including dependents and guests; use the active header profile for Your Nutrition focus, keep an unassigned serving pool only for allocation semantics, and do not add any Nutrition-specific login, access ID, passphrase, session, or private-profile onboarding."
      - "Implement versioned nutrient definitions, reference values, sources, goals, food records, recipe calculations, prepared instances, allocations, consumption snapshots, measurements, insights, and calculation versions without duplicating core models."
      - "Calculate recipe nutrition from supported ingredient quantities and conversions, serving scale, yield, edible/drained portions, substitutions, optional ingredients, and explicit retention data, with source/confidence/completeness."
      - "Planned meals remain projections, cooking remains distinct from serving and consumption, and confirmed portions create immutable snapshots."
      - "Integrate concise recipe-card values, per-person planner previews, Food Diary, Pantry/grocery suggestions, normalized authorized household comparisons, accessible charts, and deterministic recommendations."
      - "Version goals and historical context; manual and clinician-provided goals are never overwritten by reference updates."
      - "Complete migrations, development-database checks, comprehensive unit/integration/E2E/accessibility coverage, formatting, lint, types, OpenAPI, build, documentation, and final report."
      - "Future wearables, health-platform, smart-scale, clinical, restaurant, photo, barcode, receipt, sharing/export, and notification integrations are extension points only unless infrastructure already supports them."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41738/nutrition/"
    command: "node C:/Users/Callum/.codex/plugins/cache/goalbuddy/goalbuddy/0.4.1/skills/goal-prep/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal C:/Users/Callum/Documents/Recipe/docs/goals/nutrition --port 41738"

