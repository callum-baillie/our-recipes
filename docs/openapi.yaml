        '404': { description: Backup not found }
        '409': { description: Profile selection required or restore refused }
        '422': { description: Backup archive or manifest failed validation }
  /exports/recipes:
    get:
      operationId: exportPortableRecipeArchive
      summary: Download a server-generated portable full-recipe archive
      description: >-
        Streams generated Schema.org JSON-LD and referenced normalized WebP files
        with a checksum manifest. This output-only endpoint accepts no archive
        bytes, paths, files, or restore input.
      responses:
        '200':
          description: Gzip-compressed portable recipe archive
          content:
            application/gzip:
              schema: { type: string, format: binary }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: Profile selection required }
        '422': { description: The bounded generated export could not be created safely }
  /cook-sessions/{sessionId}/complete:
    post:
      operationId: completeCookSession
      summary: Explicitly confirm adjusted Pantry deductions and complete cooking atomically
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Cooking session completed }
        '400': { description: Explicit confirmation or deduction input missing }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Cooking session not found }
        '409': { description: Pantry stock or cooking session changed }
  /cook-sessions/{sessionId}/pantry:
    parameters:
      - name: sessionId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getCookSessionPantryPreview
      summary: Refresh the planned-meal identity and server-derived FEFO Pantry review
      responses:
        '200':
          { description: 'Exact batch, location, expiry, quantity, and compatible-product review' }
        '404': { description: Cooking session not found }
        '409': { description: Profile selection required }
    post:
      operationId: previewCookSessionPantryAllocation
      summary: Recalculate an adjusted one-cook product and quantity using server FEFO rules
      responses:
        '200': { description: Adjusted server-derived exact batch review }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Cooking session or Pantry product not found }
        '409': { description: Profile selection required }
  /cook-sessions/{sessionId}/pantry/undo:
    post:
      operationId: undoCookSessionPantry
      summary: Undo unchanged cooking deductions with compensating events
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Pantry deductions undone }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Pantry cook record not found }
        '409': { description: Stock or linked leftovers changed and require review }
  /pantry/summary:
    get:
      operationId: getPantrySummary
      summary: Read filtered Pantry inventory and summary totals
      parameters:
        - { name: q, in: query, schema: { type: string, maxLength: 160 } }
        - {
            name: view,
            in: query,
            schema:
              {
                type: string,
                enum: [all, pantry, refrigerator, freezer, low_stock, opened, recent],
              },
          }
        - {
            name: sort,
            in: query,
            schema: { type: string, enum: [name, expiry, quantity, added, updated, location] },
          }
      responses:
        '200': { description: 'Products, locations, batches, summary totals, and recent history' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
  /pantry/products:
    get:
      operationId: listPantryProducts
      summary: List canonical Pantry products
      responses:
        '200': { description: Canonical products with aliases and identifiers }
        '400': { $ref: '#/components/responses/InvalidRequest' }
    post:
      operationId: createPantryProduct
      summary: Create a canonical Pantry product
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PantryProductInput' }
      responses:
        '201': { description: Canonical product created }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: Active profile required or duplicate product }
  /pantry/products/{productId}:
    patch:
      operationId: updatePantryProduct
      summary: Replace one canonical Pantry product definition
      parameters:
        - { name: productId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PantryProductInput' }
      responses:
        '200': { description: Canonical product updated }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Product not found }
        '409': { description: Product conflict or active profile required }
  /pantry/locations:
    get:
      operationId: listPantryLocations
      summary: List the nested Pantry storage tree
      responses:
        '200': { description: Active storage locations with paths }
        '400': { $ref: '#/components/responses/InvalidRequest' }
    post:
      operationId: createPantryLocation
      summary: Create a Pantry storage location
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PantryLocationInput' }
      responses:
        '201': { description: Storage location created }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: Active profile required or duplicate sibling location }
  /pantry/locations/{locationId}:
    patch:
      operationId: updatePantryLocation
      summary: Rename, move, archive, or restore a storage location
      parameters:
        - { name: locationId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PantryLocationInput' }
      responses:
        '200': { description: Storage location updated }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Location not found }
        '409': { description: Location contains active stock/children or active profile required }
  /pantry/batches:
    get:
      operationId: listPantryBatches
      summary: List filtered physical Pantry batches
      responses:
        '200':
          { description: 'Physical batches with product, location, quantity, and expiry state' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
    post:
      operationId: createPantryBatch
      summary: Add a physical Pantry batch
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PantryBatchInput' }
      responses:
        '201': { description: Physical batch and immutable add event created }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: Active profile required }
  /pantry/batches/{batchId}:
    patch:
      operationId: updatePantryBatch
      summary: Replace version-protected physical batch details
      parameters:
        - { name: batchId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - { $ref: '#/components/schemas/PantryBatchInput' }
                - type: object
                  required: [expectedVersion]
                  properties:
                    expectedVersion: { type: integer, minimum: 1 }
      responses:
        '200': { description: Batch and immutable edit event updated }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Batch not found }
        '409': { description: Stale version or active profile required }
  /pantry/batches/{batchId}/actions:
    post:
      operationId: applyPantryBatchAction
      summary: Apply and record one version-protected stock action
      parameters:
        - { name: batchId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, expectedVersion]
              properties:
                type:
                  {
                    type: string,
                    enum:
                      [
                        consume,
                        consume_one,
                        mark_empty,
                        open,
                        move,
                        freeze,
                        thaw,
                        correct,
                        discard,
                        donate,
                        restore,
                        split,
                        combine,
                        undo,
                      ],
                  }
                expectedVersion: { type: integer, minimum: 1 }
                quantity: { type: number, exclusiveMinimum: 0 }
                unit: { type: string, maxLength: 30 }
                locationId: { type: string, format: uuid }
                targetBatchId: { type: string, format: uuid }
                targetExpectedVersion: { type: integer, minimum: 1 }
                reason: { type: string, maxLength: 160 }
                note: { type: string, maxLength: 500 }
      responses:
        '200':
          { description: Updated batch and immutable action event or paired split/combine events }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Batch or destination location not found }
        '409':
          {
            description: 'Stale source/peer version, insufficient or incompatible stock, lossy combine metadata, or active profile required',
          }
  /pantry/events:
    get:
      operationId: listPantryEvents
      summary: Read bounded immutable Pantry history
      parameters:
        - { name: batchId, in: query, schema: { type: string, format: uuid } }
        - {
            name: limit,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 200, default: 50 },
          }
      responses:
        '200': { description: 'Newest Pantry events, optionally limited to one batch' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
  /pantry/mappings/{ingredientId}:
    parameters:
      - in: path
        name: ingredientId
        required: true
        schema: { type: string, format: uuid }
    put:
      operationId: setRecipeIngredientPantryMapping
      summary: Save an actor-attributed manual Pantry mapping without changing recipe text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [productId]
              properties:
                productId: { type: string, format: uuid }
                compatibleVariant: { type: boolean, default: false }
                isOptional: { type: boolean, default: false }
      responses:
        '200': { description: 'Saved manual ingredient mapping' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: 'Ingredient or active Pantry product not found' }
        '409': { description: 'Active profile selection required' }
    delete:
      operationId: removeRecipeIngredientPantryMapping
      summary: Remove a manual Pantry mapping without changing recipe text
      responses:
        '204': { description: 'Mapping removed' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: 'Mapping not found' }
        '409': { description: 'Active profile selection required' }
  /pantry/recipes/{recipeId}/availability:
    get:
      operationId: getRecipePantryAvailability
      summary: Calculate serving-scaled recipe availability from compatible exact stock
      parameters:
        - in: path
          name: recipeId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: servings
          schema: { type: number, exclusiveMinimum: 0, maximum: 1000 }
      responses:
        '200':
          description: >-
            Ready, partial, or unknown ingredient-level availability with matching batches,
            locations, planned commitments, projected remainder, and recorded expiry context.
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '404': { description: 'Recipe not found' }
  /pantry/demand:
    get:
      operationId: getProjectedPantryDemand
      summary: Allocate non-mutating Pantry demand chronologically across active planned meals
      parameters:
        - in: query
          name: weekStart
          required: true
          description: Real Gregorian calendar date at the inclusive start of the range.
          schema: { type: string, format: date }
        - in: query
          name: weekEnd
          required: true
          description: Real Gregorian calendar date at the inclusive end of the range.
          schema: { type: string, format: date }
      responses:
        '200':
          description: >-
            Read-only demand lines distinguish covered, definitive shortage, and uncertain
            conclusions. Uncertain lines expose a null shortageQuantity and an
            uncertaintyReason when approximate or incompatible stock could change the result.
            Skipped, cancelled, and meals with completed linked cook sessions are excluded.
            Lines can include projected remainder, later exhaustion, earliest recorded expiry,
            and recorded expiry-before-meal conflicts without food-safety conclusions.
        '400': { $ref: '#/components/responses/InvalidRequest' }
  /integrations/homepage/v1/summary:
    servers:
      - url: /api
    get:
      operationId: getHomepageSummary
      summary: Return the private Homepage dashboard summary
      description: >-
        Read-only server-to-server summary. Requires the bearer token configured
        in HOMEPAGE_INTEGRATION_TOKEN and returns no profile data, notes, checked
        grocery items, or write actions.
      security:
        - HomepageBearer: []
      responses:
        '200':
          description: Current presentation-ready Homepage summary
          headers:
            Cache-Control:
              schema: { type: string, const: 'private, no-store' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HomepageSummary' }
        '401':
          description: Missing, invalid, or unconfigured integration credentials
components:
  securitySchemes:
    HomepageBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque integration token
  schemas:
    PantryProductInput:
      type: object
      required: [displayName]
      properties:
        displayName: { type: string, minLength: 1, maxLength: 160 }
        brand: { type: string, maxLength: 120 }
        variant: { type: string, maxLength: 120 }
        category: { type: string, maxLength: 80 }
        aliases: { type: array, maxItems: 30, items: { type: string, maxLength: 120 } }
        defaultInventoryUnit: { type: string, maxLength: 30, default: each }
        defaultStorageType: { type: string, enum: [pantry, refrigerator, freezer, counter, other] }
        isStaple: { type: boolean, default: false }
        reorderThreshold: { type: [number, 'null'], minimum: 0 }
        stockUnit: { type: string, maxLength: 30 }
    PantryLocationInput:
      type: object
      required: [name, storageType]
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        parentId: { type: string }
        storageType: { type: string, enum: [pantry, refrigerator, freezer, counter, other] }
        description: { type: string, maxLength: 500 }
        archived: { type: boolean, default: false }
    PantryBatchInput:
      type: object
      required: [productId, locationId]
      properties:
        productId: { type: string, format: uuid }
        quantityRemaining: { type: [number, 'null'], minimum: 0 }
        originalQuantity: { type: [number, 'null'], exclusiveMinimum: 0 }
        unit: { type: string, maxLength: 30 }
        approximateState:
          {
            type: [string, 'null'],
            enum: [full, three_quarters, half, quarter, almost_empty, unknown, null],
          }
        locationId: { type: string, format: uuid }
        bestBeforeDate: { type: [string, 'null'], format: date }
        useByDate: { type: [string, 'null'], format: date }
        status:
          {
            type: string,
            enum: [unopened, opened, frozen, thawed, reserved, depleted, discarded, donated],
          }
        notes: { type: string, maxLength: 2000 }
    HomepageSummary:
      type: object
      required: [generatedAt, nextMeal, groceryList]
      properties:
        generatedAt: { type: string, format: date-time }
        nextMeal:
          oneOf:
            - { $ref: '#/components/schemas/HomepageNextMeal' }
            - { type: 'null' }
        groceryList:
          oneOf:
            - { $ref: '#/components/schemas/HomepageGroceryList' }
            - { type: 'null' }
    HomepageNextMeal:
      type: object
      required: [date, slot, title, recipeUrl, imageUrl, servings, scheduledFor]
      properties:
        date: { type: string, format: date }
        slot: { type: string, enum: [breakfast, lunch, dinner, snack] }
        title: { type: string }
        recipeUrl: { type: string, format: uri, pattern: '^https://recipes\\.tower/' }
        imageUrl:
          oneOf:
            - { type: string, format: uri, pattern: '^https://recipes\\.tower/' }
            - { type: 'null' }
        servings: { type: integer, minimum: 1 }
        scheduledFor: { type: string, format: date-time }
    HomepageGroceryList:
      type: object
      required: [title, updatedAt, totalItems, remainingItems, items]
      properties:
        title: { type: string }
        updatedAt: { type: string, format: date-time }
        totalItems: { type: integer, minimum: 0 }
        remainingItems: { type: integer, minimum: 0 }
        items:
          type: array
          maxItems: 5
          items: { $ref: '#/components/schemas/HomepageGroceryItem' }
    HomepageGroceryItem:
      type: object
      required: [name, quantity, category]
      properties:
        name: { type: string }
        quantity: { type: string }
        category: { type: string }
    ProfileInput:
      type: object
      required: [displayName, color, units, temperatureUnit, locale, timezone]
      properties:
        displayName: { type: string, minLength: 1, maxLength: 80 }
        color: { type: string, pattern: '^#[0-9a-fA-F]{6}$' }
        avatarUrl: { type: string, format: uri }
        units: { type: string, enum: [metric, imperial] }
        temperatureUnit: { type: string, enum: [C, F] }
        locale: { type: string }
        timezone: { type: string }
        mainGoals: { type: string, maxLength: 2000 }
        goalContext:
          type: object
          additionalProperties: false
          properties:
            focusAreas:
              type: array
              maxItems: 8
              uniqueItems: true
              items:
                type: string
                enum:
                  - feel-healthier
                  - weight-goals
                  - organized-meals
                  - easier-groceries
                  - understand-nutrition
                  - cook-more
                  - discover-recipes
                  - reduce-food-waste
                  - save-money
                  - support-dietary-needs
            motivation: { type: string, maxLength: 800 }
            challenges: { type: string, maxLength: 800 }
            successVision: { type: string, maxLength: 800 }
    ProfileArchiveInput:
      type: object
      required: [archived]
      properties:
        archived: { type: boolean }
    TagInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 40 }
        color: { type: string, pattern: '^#[0-9a-fA-F]{6}$' }
    TagMergeInput:
      type: object
      required: [targetName]
      properties:
        targetName: { type: string, minLength: 1, maxLength: 40 }
        targetColor: { type: string, pattern: '^#[0-9a-fA-F]{6}$' }
    CollectionInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 800 }
        coverImageId:
          oneOf:
            - { type: string, format: uuid }
            - { type: string, maxLength: 0 }
    CollectionOrderInput:
      type: object
      required: [collectionIds]
      properties:
        collectionIds:
          type: array
          minItems: 1
          maxItems: 200
          items: { type: string, format: uuid }
    CollectionRecipesInput:
      type: object
      required: [recipeIds]
      properties:
        recipeIds:
          type: array
          maxItems: 2000
          items: { type: string, format: uuid }
    CollectionRecipeInput:
      type: object
      required: [recipeId]
      properties:
        recipeId: { type: string, format: uuid }
    CaptureDraftRequest:
      oneOf:
        - type: object
          required: [kind, text]
          properties:
            kind: { type: string, const: text }
            text: { type: string, minLength: 20, maxLength: 100000 }
        - type: object
          required: [kind, url]
          properties:
            kind: { type: string, const: url }
            url: { type: string, format: uri, maxLength: 2048 }
            candidateIndex:
              type: integer
              minimum: 0
              maximum: 19
              description: Omit to list candidates; supply a displayed index for one editable review draft.
    ImportConfirmationInput:
      type: object
      required: [recipe]
      properties:
        recipe: { $ref: '#/components/schemas/RecipeInput' }
    AiReviewRequest:
      oneOf:
        - type: object
          required: [confirm, kind, sourceText, sourceLabel]
          properties:
            confirm: { type: boolean, const: true }
            kind: { type: string, const: text-normalization }
            sourceText: { type: string, minLength: 20, maxLength: 30000 }
            sourceLabel: { type: string, minLength: 1, maxLength: 160 }
            improve: { type: boolean, default: false }
        - type: object
          required: [confirm, kind, importId]
          properties:
            confirm: { type: boolean, const: true }
            kind: { type: string, const: vision-extraction }
            importId: { type: string, format: uuid }
            improve: { type: boolean, default: false }
    AiImageGenerationRequest:
      type: object
      required: [confirm]
      properties:
        confirm: { type: boolean, const: true }
    JsonLdDraftRequest:
      type: object
      required: [source]
      properties:
        source:
          type: string
          minLength: 2
          maxLength: 1000000
          description: Pasted JSON-LD only. URLs, files, and archives are not accepted.
        candidateIndex:
          type: integer
          minimum: 0
          maximum: 19
          description: Omit to list candidates; supply a displayed index to create an editable draft.
    SetupInput:
      type: object
      required: [householdName, appName, profile]
      properties:
        householdName: { type: string, minLength: 1, maxLength: 80 }
        appName: { type: string, minLength: 1, maxLength: 80 }
        profile: { $ref: '#/components/schemas/ProfileInput' }
    HouseholdSettingsInput:
      type: object
      additionalProperties: false
      required: [householdName, appName]
      properties:
        householdName: { type: string, minLength: 1, maxLength: 80 }
        appName: { type: string, minLength: 1, maxLength: 80 }
    RecipeInput:
      type: object
      required:
        [title, servings, prepMinutes, cookMinutes, tags, ingredientGroups, instructionSections]
      properties:
        title: { type: string, minLength: 1, maxLength: 160 }
        summary: { type: string, maxLength: 800 }
        status: { type: string, enum: [active, archived, trash], default: active }
        servings: { type: string, minLength: 1, maxLength: 80 }
        prepMinutes: { type: integer, minimum: 0 }
        cookMinutes: { type: integer, minimum: 0 }
        restMinutes: { type: integer, minimum: 0, default: 0 }
        difficulty: { type: string, maxLength: 40 }
        cuisine: { type: string, maxLength: 80 }
        category: { type: string, maxLength: 80 }
        tips: { type: string, maxLength: 2000 }
        sharedNotes: { type: string, maxLength: 2000 }
        sourceName: { type: string }
        sourceUrl: { type: string, format: uri }
        originalAuthor: { type: string, maxLength: 160 }
        cookingMethod: { type: string, maxLength: 80 }
        equipment:
          type: array
          maxItems: 30
          items: { type: string, maxLength: 120 }
        nutritionCalories: { type: number, minimum: 0 }
        nutritionProteinGrams: { type: number, minimum: 0 }
        nutritionCarbohydrateGrams: { type: number, minimum: 0 }
        nutritionFatGrams: { type: number, minimum: 0 }
        nutritionSaturatedFatGrams: { type: number, minimum: 0 }
        nutritionFiberGrams: { type: number, minimum: 0 }
        nutritionSugarGrams: { type: number, minimum: 0 }
        nutritionSodiumMilligrams: { type: number, minimum: 0 }
        tags: { type: array, items: { type: string } }
        ingredientGroups: { type: array, items: { type: object } }
        instructionSections: { type: array, items: { type: object } }
    RecipeUpdateInput:
      allOf:
        - $ref: '#/components/schemas/RecipeInput'
        - type: object
          required: [expectedRevision]
          properties:
            expectedRevision: { type: integer, minimum: 1 }
    RecipeTagsUpdateInput:
      type: object
      additionalProperties: false
      required: [tags, expectedRevision]
      properties:
        tags:
          type: array
          maxItems: 20
          items: { type: string, minLength: 1, maxLength: 40 }
        expectedRevision: { type: integer, minimum: 1 }
    AiNutritionEstimationInput:
      type: object
      additionalProperties: false
      required: [confirm, expectedRevision]
      properties:
        confirm: { type: boolean, const: true }
        expectedRevision: { type: integer, minimum: 1 }
    AiRecipeImprovementInput:
      type: object
      additionalProperties: false
      required: [confirm, expectedRevision, recipe]
      properties:
        confirm: { type: boolean, const: true }
        expectedRevision: { type: integer, minimum: 1 }
        recipe: { $ref: '#/components/schemas/RecipeInput' }
    RecipeStatusInput:
      type: object
      required: [status, expectedRevision]
      properties:
        status: { type: string, enum: [active, archived, trash] }
        expectedRevision: { type: integer, minimum: 1 }
    RecipePreferenceInput:
      type: object
      properties:
        rating:
          oneOf:
            - { type: integer, minimum: 1, maximum: 5 }
