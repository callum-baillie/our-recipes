openapi: 3.1.0
info:
  title: Our Recipes API
  version: 1.0.0-rc.1
  description: Trusted-household self-hosted API. Profiles are convenience identity, not authentication or access control.
  license:
    name: Private household use — see repository license decision before redistribution
    identifier: LicenseRef-Proprietary
servers:
  - url: /api/v1
security: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Report application readiness
      responses:
        '200':
          description: Application is reachable
          content:
            application/json:
              schema:
                type: object
                required: [status, version, schemaVersion, migrationStatus, setupComplete]
                properties:
                  status: { type: string, enum: [ok, error] }
                  version: { type: string, example: 1.0.0-rc.1 }
                  schemaVersion: { type: string, example: 0038_meal_plan_ingredient_snapshots }
                  migrationStatus: { type: string, enum: [current, incomplete] }
                  setupComplete: { type: boolean }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '503': { description: Storage is unavailable }
  /food-data/status:
    get:
      operationId: getFoodDataStatus
      summary: Report non-secret food provider capabilities and quota state
      responses:
        '200':
          description: Provider and camera readiness without credentials
        '400': { $ref: '#/components/responses/InvalidRequest' }
  /food-data/barcode-lookups:
    post:
      operationId: lookupFoodBarcode
      summary: Resolve a validated GTIN through local, Open Food Facts, and optional USDA sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [barcode]
              properties:
                barcode: { type: string, minLength: 1, maxLength: 32 }
                language: { type: string, default: en }
                compareUsda: { type: boolean, default: false }
      responses:
        '200':
          { description: 'Preferred normalized record, exact alternatives, and provider status' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: No exact local or provider record }
        '409': { description: Active profile selection required }
        '429': { description: Install or upstream provider budget exhausted }
        '503': { description: Configured providers are unavailable }
  /food-data/searches:
    post:
      operationId: searchFoodData
      summary: Search local products and USDA FoodData Central on explicit submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [query, context]
              properties:
                query: { type: string, minLength: 2, maxLength: 120 }
                context: { type: string, enum: [pantry, recipe, nutrition] }
                kind: { type: string, enum: [any, generic, branded], default: any }
                page: { type: integer, minimum: 1, maximum: 10, default: 1 }
      responses:
        '200':
          { description: 'Local products, normalized USDA records, status, and cache freshness' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: Active profile selection required }
  /food-data/details:
    post:
      operationId: getFoodDataDetails
      summary: Resolve a selected provider record to the normalized review model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [provider, recordId]
              properties:
                provider: { type: string, enum: [open_food_facts, usda_fdc] }
                recordId: { type: string, minLength: 1, maxLength: 160 }
                language: { type: string, default: en }
      responses:
        '200': { description: Normalized provider record and freshness metadata }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Provider record not found }
        '409': { description: Active profile selection required }
  /food-data/imports:
    post:
      operationId: importReviewedFoodData
      summary: Create or reuse a catalog product from a reviewed provider record without stock or intake
      responses:
        '201':
          {
            description: 'Product, immutable source snapshot, and nutrition record created or reused',
          }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: 'Identity, review, or idempotency conflict' }
  /pantry/catalog-imports:
    post:
      operationId: importReviewedFoodDataToPantry
      summary: Atomically import reviewed food data and add one or more physical Pantry batches
      responses:
        '201': { description: Catalog product and Pantry batches created or reused }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: 'Identity, review, or idempotency conflict' }
  /ai/status:
    get:
      operationId: getAiStatus
      summary: Report the non-secret AI connection state
      responses:
        '200':
          description: AI readiness status without credentials or provider output
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: object
                    required: [provider, state, enabled, message, supportedOperationKinds]
                    properties:
                      provider: { type: string, const: OpenAI }
                      state: { type: string, enum: [unconfigured, configured] }
                      enabled: { type: boolean }
                      message: { type: string }
                      supportedOperationKinds:
                        type: array
                        items:
                          type: string
                          enum:
                            - text-normalization
                            - vision-extraction
                            - image-generation
                            - nutrition-estimation
                            - recipe-improvement
        '400': { $ref: '#/components/responses/InvalidRequest' }
  /ai/reviews:
    post:
      operationId: createAiReview
      summary: Explicitly request a review-only OpenAI recipe suggestion
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AiReviewRequest' }
      responses:
        '200': { description: Editable review candidate and content-free audit summary }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: Active profile selection required }
        '422': { description: Source was not a valid bounded AI review input }
        '429': { description: Per-profile AI rate limit exceeded }
        '503': { description: OpenAI is not configured on this server }
  /setup:
    post:
      operationId: completeSetup
      summary: Create the household and first profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetupInput' }
      responses:
        '201': { description: Household created }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: Household already exists }
  /settings:
    patch:
      operationId: updateHouseholdSettings
      summary: Update shared app and household display names
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HouseholdSettingsInput' }
      responses:
        '200': { description: Updated household settings }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: Household setup required }
  /profiles:
    get:
      operationId: listProfiles
      summary: List household profiles
      responses:
        '200': { description: Profile list }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '503': { description: Storage is unavailable }
    post:
      operationId: addProfile
      summary: Add a household profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileInput' }
      responses:
        '201': { description: Profile created }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
  /profiles/{profileId}/active:
    patch:
      operationId: setActiveProfile
      summary: Select the active non-auth profile
      parameters:
        - name: profileId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Active profile cookie set }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Profile not found }
  /profiles/{profileId}:
    parameters:
      - name: profileId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateProfile
      summary: Update a household profile’s preferences
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileInput' }
      responses:
        '200': { description: Profile updated }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Profile not found }
    post:
      operationId: setProfileArchiveState
      summary: Archive or restore a profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileArchiveInput' }
      responses:
        '200': { description: Profile archive state updated }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Profile not found }
        '409': { description: Profile archive is unsafe or active }
  /tags:
    get:
      operationId: listTags
      summary: List canonical household tags with usage counts
      responses:
        '200': { description: Tag list }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '503': { description: Tag storage is unavailable }
    post:
      operationId: createTag
      summary: Create a canonical household tag
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TagInput' }
      responses:
        '201': { description: Tag created }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: Tag already exists }
  /tags/{tagName}:
    parameters:
      - name: tagName
        in: path
        required: true
        schema: { type: string, maxLength: 40 }
    patch:
      operationId: updateTag
      summary: Rename or recolor a tag while preserving recipe associations
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TagInput' }
      responses:
        '200': { description: Tag updated }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Tag not found }
        '409': { description: Target tag exists; use merge }
    delete:
      operationId: deleteTag
      summary: Remove a tag association from every recipe
      responses:
        '204': { description: Tag removed }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Tag not found }
  /tags/{tagName}/merge:
    post:
      operationId: mergeTag
      summary: Merge a source tag into a target tag
      parameters:
        - name: tagName
          in: path
          required: true
          schema: { type: string, maxLength: 40 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TagMergeInput' }
      responses:
        '200': { description: Tags merged }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Source tag not found }
  /collections:
    get:
      operationId: listCollections
      summary: List manually ordered household collections with optional local-photo covers
      responses:
        '200': { description: Collection list }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '503': { description: Collection storage is unavailable }
    post:
      operationId: createCollection
      summary: Create a curated household collection
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CollectionInput' }
      responses:
        '201': { description: Collection created }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: Active profile is missing or collection name conflicts }
  /collections/order:
    post:
      operationId: reorderCollections
      summary: Replace the manual order of all household collections
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CollectionOrderInput' }
      responses:
        '200': { description: Collection order saved }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: Active profile is missing or the list is stale }
  /collections/{collectionId}:
    parameters:
      - name: collectionId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getCollection
      summary: Read one collection with its ordered recipes and selectable saved-photo covers
      responses:
        '200': { description: Collection detail }
        '404': { description: Collection not found }
    patch:
      operationId: updateCollection
      summary: Update collection details or choose a cover from one of its saved recipe photos
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CollectionInput' }
      responses:
        '200': { description: Collection updated }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Collection not found }
        '409': { description: Active profile is missing or collection name conflicts }
    delete:
      operationId: deleteCollection
      summary: Remove a collection without deleting any recipe or photo
      responses:
        '204': { description: Collection removed }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Collection not found }
  /collections/{collectionId}/recipes:
    post:
      operationId: addRecipeToCollection
      summary: Add one recipe to the end of a collection if it is not already present
      parameters:
        - name: collectionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CollectionRecipeInput' }
      responses:
        '200': { description: Recipe was already in the collection }
        '201': { description: Recipe added to the collection }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Collection not found }
        '409': { description: Active profile is missing }
    put:
      operationId: replaceCollectionRecipes
      summary: Replace a collection’s ordered recipe membership
      parameters:
        - name: collectionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CollectionRecipesInput' }
      responses:
        '200': { description: Collection membership saved }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Collection not found }
        '409': { description: Active profile is missing }
  /recipes:
    get:
      operationId: listRecipes
      summary: Search a paginated, lifecycle-aware shared recipe library
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: creator
          in: query
          schema: { type: string, format: uuid }
        - name: tag
          in: query
          schema: { type: string, maxLength: 40 }
        - name: collection
          in: query
          schema: { type: string, format: uuid }
        - name: category
          in: query
          schema: { type: string, maxLength: 80 }
        - name: cuisine
          in: query
          schema: { type: string, maxLength: 80 }
        - name: maxTotalMinutes
          in: query
          schema: { type: integer, minimum: 1, maximum: 30240 }
        - name: favorite
          in: query
          schema: { type: boolean }
        - name: cooked
          in: query
          schema: { type: boolean }
        - name: status
          in: query
          schema: { type: string, enum: [active, archived, trash, all], default: active }
        - name: sort
          in: query
          schema:
            {
              type: string,
              enum:
                [
                  recently-added,
                  recently-updated,
                  alphabetical,
                  most-recently-cooked,
                  shortest-time,
                ],
            }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
      responses:
        '200': { description: Recipe cards }
        '400': { description: Invalid search query }
    post:
      operationId: createRecipe
      summary: Create a structured recipe and first revision
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecipeInput' }
      responses:
        '201': { description: Recipe created }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '409': { description: Profile selection required }
  /recipes/{recipeId}:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getRecipe
      summary: Read a structured recipe card and revision metadata
      responses:
        '200': { description: Recipe card }
        '404': { description: Recipe not found }
    put:
      operationId: updateRecipe
      summary: Replace the current recipe card and append a revision when its expected revision matches
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecipeUpdateInput' }
      responses:
        '200': { description: New recipe revision saved }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Recipe not found }
        '409': { description: Profile selection required or recipe revision conflict }
  /recipes/{recipeId}/tags:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateRecipeTags
      summary: Replace a recipe's tags and append a revision when its expected revision matches
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecipeTagsUpdateInput' }
      responses:
        '200': { description: Recipe tags and revision saved }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Recipe not found }
        '409': { description: Profile selection required or recipe revision conflict }
  /recipes/{recipeId}/nutrition/estimate:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: estimateRecipeNutrition
      summary: Ask OpenAI to estimate per-serving nutrition and save it as a new recipe revision
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AiNutritionEstimationInput' }
      responses:
        '201': { description: Estimated nutrition saved as a new recipe revision }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Recipe not found }
        '409': { description: Profile selection required or recipe revision conflict }
        '422': { description: OpenAI could not produce or save a valid estimate }
        '429': { description: Profile AI-action rate limit reached }
        '503': { description: OpenAI is not configured }
  /recipes/{recipeId}/improve:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: improveRecipe
      summary: Ask OpenAI for a review-only recipe improvement while preserving ingredients
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AiRecipeImprovementInput' }
      responses:
        '201': { description: Editable improved candidate; the saved recipe is unchanged }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Recipe not found }
        '409': { description: Profile selection required or recipe revision conflict }
        '422': { description: OpenAI could not produce a valid improved candidate }
        '429': { description: Profile AI-action rate limit reached }
        '503': { description: OpenAI is not configured }
  /recipes/{recipeId}/export:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: exportRecipeJsonLd
      summary: Download a deterministic Schema.org Recipe JSON-LD document
      responses:
        '200':
          description: Portable recipe JSON-LD without household-private fields
          content:
            application/ld+json:
              schema: { type: object }
        '404': { description: Recipe not found }
  /recipes/{recipeId}/export/markdown:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: exportRecipeMarkdown
      summary: Download a deterministic portable Markdown recipe without profile-private preferences
      responses:
        '200':
          description: Portable Markdown recipe
          content:
            text/markdown:
              schema: { type: string }
        '404': { description: Recipe not found }
  /recipes/{recipeId}/preference:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      operationId: setRecipePreference
      summary: Save the active profile’s private rating and note without changing the shared recipe revision
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecipePreferenceInput' }
      responses:
        '200': { description: Private profile preference saved }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Recipe not found }
        '409': { description: Profile selection required }
    patch:
      operationId: setRecipeReaction
      summary: Set or clear the active profile’s dislike, like, or staple score while preserving its note
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecipeReactionInput' }
      responses:
        '200': { description: Private profile reaction saved }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Recipe not found }
        '409': { description: Profile selection required }
  /recipes/{recipeId}/revisions/{revision}/restore:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: revision
        in: path
        required: true
        schema: { type: integer, minimum: 1 }
    post:
      operationId: restoreRecipeRevision
      summary: Restore a saved shared recipe snapshot by appending a new revision
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecipeRevisionRestoreInput' }
      responses:
        '200': { description: Restored recipe saved as a new revision }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Recipe or saved revision not found }
        '409': { description: Profile selection required or recipe revision conflict }
  /recipes/{recipeId}/duplicate:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: duplicateRecipe
      summary: Create an active editable copy of a current recipe
      responses:
        '201': { description: Recipe copy created }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Recipe not found }
        '409': { description: Profile selection required }
  /recipes/{recipeId}/status:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateRecipeStatus
      summary: Update a recipe lifecycle state with revision protection
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecipeStatusInput' }
      responses:
        '200': { description: New lifecycle revision saved }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '403': { $ref: '#/components/responses/UntrustedOrigin' }
        '404': { description: Recipe not found }
        '409': { description: Profile selection required or recipe revision conflict }
  /recipes/{recipeId}/images:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: createRecipeImage
      summary: Add a bounded local recipe photo and return normalized media metadata
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
