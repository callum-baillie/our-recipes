services:
  our-recipes:
    image: ghcr.io/callum-baillie/our-recipes:latest
    container_name: our-recipes
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATA_DIR: /data
      DATABASE_URL: /data/our-recipes.db
      APP_ORIGIN: http://recipes.lan:3000
      COOKIE_SECRET: replace-with-a-unique-secret-of-at-least-32-characters
      TZ: America/Los_Angeles
      BACKUP_INTERVAL_HOURS: 24
      BACKUP_RETENTION_DAYS: 30
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - /mnt/user/appdata/our-recipes:/data
