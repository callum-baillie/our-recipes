services:
  bord:
    build:
      context: .
    image: bord:local
    container_name: bord
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATA_DIR: /data
      DATABASE_URL: /data/bord.db
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      COOKIE_SECRET: ${COOKIE_SECRET:?Set a unique secret of at least 32 characters}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-}
      HOMEPAGE_INTEGRATION_TOKEN: ${HOMEPAGE_INTEGRATION_TOKEN:-}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPEN_FOOD_FACTS_ENABLED: ${OPEN_FOOD_FACTS_ENABLED:-true}
      OPEN_FOOD_FACTS_USER_AGENT: ${OPEN_FOOD_FACTS_USER_AGENT:-Bord/1.0.0-rc.1 (https://github.com/callum-baillie/bord)}
      USDA_FDC_ENABLED: ${USDA_FDC_ENABLED:-true}
      USDA_FDC_API_KEY: ${USDA_FDC_API_KEY:-}
    volumes:
      - ./data:/data
